<!DOCTYPE html>
<html>
<head>
  <title>Quantity Measurement</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>Welcome To Quantity Measurement</h1>
  </div>

  <div class="container">

    <!-- Choose Type -->
    <h4>CHOOSE TYPE</h4>
    <div class="types">
      <div class="card active">📏<span>Length</span></div>
      <div class="card">⚖️<span>Weight</span></div>
      <div class="card">🌡️<span>Temperature</span></div>
      <div class="card">🧪<span>Volume</span></div>
    </div>

    <!-- Choose Action -->
    <h4>CHOOSE ACTION</h4>
    <div class="actions">
      <button class="btn active">Comparison</button>
      <button class="btn">Conversion</button>
      <button class="btn">Arithmetic</button>
    </div>

    <!-- Conversion Section -->
    <div class="conversion">

      <div class="box">
        <label>FROM</label>
        <input type="number" value="1">
        <select>
          <option>Kilometer</option>
          <option>Meter</option>
        </select>
      </div>

      <div class="box">
        <label>TO</label>
        <input type="number" value="1000">
        <select>
          <option>Meter</option>
          <option>Kilometer</option>
        </select>
      </div>

    </div>

  </div>

</body>
</html>
